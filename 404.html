<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Page Not Found | FreeToolKit</title>
    <meta name="robots" content="noindex, follow">
    
    <link rel="stylesheet" href="./css/style.css">
    
    <style>
        .error-container {
            text-align: center;
            padding: 8rem 0;
            max-width: 600px;
            margin: 0 auto;
        }
        .error-code {
            font-size: 8rem;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 1rem;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <!-- Shared Navbar Injection -->
    <div id="navbar-placeholder"></div>

    <main class="container">
        <div class="error-container">
            <div class="error-code">404</div>
            <h1 class="mb-4">Page Not Found</h1>
            <p class="mb-8" style="color:var(--text-secondary)">
                Oops! The tool or page you are looking for doesn't exist or has been moved.
            </p>
            <a href="./" class="btn btn-primary">Return to Homepage</a>
        </div>
    </main>

    <!-- Shared Footer Injection -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="./js/components/navbar.js"></script>
    <script src="./js/components/footer.js"></script>
</body>
</html>
