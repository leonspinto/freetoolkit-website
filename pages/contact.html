<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | FreeToolKit</title>
    <meta name="description" content="Get in touch with FreeToolKit. Contact us for support, feedback, or inquiries about our free browser-based tools.">
    <link rel="canonical" href="https://freetoolkit.com/pages/contact.html">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .contact-form {
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: inherit;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="container mt-8" style="max-width:800px">
        <div class="breadcrumb mb-6">
            <a href="/">Home</a> <span>></span> <span>Contact</span>
        </div>

        <h1 class="mb-4">Contact Us</h1>
        <p class="mb-8" style="color:var(--text-secondary)">Have questions, feedback, or feature requests? We'd love to hear from you. Fill out the form below and our team will get back to you as soon as possible.</p>

        <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
            <div class="form-group">
                <label class="form-label" for="name">Name</label>
                <input type="text" id="name" class="form-input" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-input" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="subject">Subject</label>
                <select id="subject" class="form-input">
                    <option>General Inquiry</option>
                    <option>Bug Report</option>
                    <option>Feature Request</option>
                    <option>Feedback</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="message">Message</label>
                <textarea id="message" rows="5" class="form-input" required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width:100%">Send Message</button>
        </form>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/js/components/navbar.js"></script>
    <script src="/js/components/footer.js"></script>
</body>
</html>
